<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Love Bombing Society</title>

  <style>
    :root{
      --bg: #000000;
      --bar: rgba(0,0,0,0.94);
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Hiragino Kaku Gothic ProN", "Noto Sans JP",
                   "Yu Gothic", sans-serif;
    }

    .wrap{
      min-height: 100vh;
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    video{
      width: min(1100px, 100vw);
      height: auto;
      max-height: calc(100vh - 64px - env(safe-area-inset-bottom));
      display: block;
      background: #000;
      outline: none;
    }

    .bottom-bar{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;
      padding: 0 32px;
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bar);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* 主役 */
    .brand{
      font-size: 22px;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
    }

    /* 従属 */
    .links a{
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.28);
      text-decoration: none;
      transition: 0.25s ease;
    }

    .links a:hover{
      color: rgba(255,255,255,0.65);
    }

    @media (max-width: 480px){
      .brand{
        font-size: 18px;
      }
      .links a{
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

<main class="wrap">
  <video controls autoplay muted loop playsinline preload="auto">
    <source src="LoveBombingSociety.mp4" type="video/mp4" />
  </video>
</main>

<nav class="bottom-bar" aria-label="Site links">
  <div class="brand">
    Love Bombing Society
  </div>

  <div class="links">
    <a href="https://kiss-info-japan.github.io/-/index.html"
       target="_blank"
       rel="noopener noreferrer">
      架空委員会宗教宗教
    </a>
  </div>
</nav>

<script data-goatcounter="https://lovebombingsociety.goatcounter.com/count"
        async
        src="https://gc.zgo.at/count.js"></script>

<script>
document.addEventListener("click", function enterFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Fullscreen error:", err);
    });
  }
  document.removeEventListener("click", enterFullscreen);
});
</script>

</body>
</html>
